<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TF.js 物件偵測範例</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <h1>TF.js 物件偵測（圖片 / 相機）</h1>
    <p class="subtle">上傳圖片或開啟相機，使用 YOLO 模型進行物件偵測。</p>

    <div class="controls" aria-label="操作區">
      <label for="modelSelect" class="muted" style="display:flex; align-items:center; gap:8px;">
        模型
        <select id="modelSelect" aria-label="選擇模型">
          <option value="pose" selected>YOLOv26n Pose</option>
          <option value="detect">YOLOv26n Detect</option>
        </select>
      </label>
      <input type="file" id="fileInput" accept="image/*" />
      <button id="detectButton" disabled>執行物件偵測</button>
      <button id="cameraButton">開啟相機</button>
      <button id="liveDetectButton" disabled>開始即時偵測</button>
      <button id="captureButton" disabled>拍照偵測</button>
    </div>

    <section class="layout">
      <div class="stage" id="stage" aria-label="畫面區">
        <img id="image" alt="預覽圖片" />
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
      </div>

      <aside class="panel" aria-label="狀態與結果">
        <div class="statusRow">
          <h2>狀態</h2>
          <div style="display:flex; gap:8px; align-items:baseline;">
            <span id="appVersion" class="badge" data-tone="ok" title="部署版本">v?</span>
            <span id="statusBadge" class="badge" data-tone="ok">載入中</span>
          </div>
        </div>
        <div id="status" role="status">模型尚未載入</div>

        <h2 style="margin-top: 12px;">結果</h2>
        <ol id="results" class="results"></ol>
      </aside>
    </section>
  </main>

  <!-- TF.js (for YOLO SavedModel -> TF.js GraphModel) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
